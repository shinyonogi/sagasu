version: 2

project_name: sagasu

before:
  hooks:
    - mkdir -p completions
    - sh -c 'go run ./cmd/sagasu completion bash > completions/sagasu.bash'
    - sh -c 'go run ./cmd/sagasu completion zsh > completions/_sagasu'
    - sh -c 'go run ./cmd/sagasu completion fish > completions/sagasu.fish'
    - go test ./...

builds:
  - id: sagasu
    main: ./cmd/sagasu
    binary: sagasu
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - sagasu
    formats:
      - tar.gz
    files:
      - README.md
      - completions/*

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  abbrev: -1
  format: "- {{ .Message }}"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]\-./]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]\-./]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]\-./]+\))??!?:.+$'
      order: 2
    - title: Refactors
      regexp: '^.*?refactor(\([[:word:]\-./]+\))??!?:.+$'
      order: 3
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^Merge"

release:
  github:
    owner: shinyonogi
    name: sagasu

brews:
  - name: sagasu
    directory: Formula
    homepage: "https://github.com/shinyonogi/sagasu"
    description: "Local full-text search CLI for source repositories"
    repository:
      owner: shinyonogi
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    install: |
      bin.install "sagasu"
      bash_completion.install "completions/sagasu.bash" => "sagasu"
      zsh_completion.install "completions/_sagasu"
      fish_completion.install "completions/sagasu.fish"
    test: |
      system "#{bin}/sagasu", "--help"
